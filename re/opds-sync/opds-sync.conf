# Configuration opds-sync — éditable à la main (sur la liseuse : /mnt/onboard/.adds/opds-sync/)
# Tout est ici : IP, clé API, dossier, formats, etc.

[server]
# URL de base du serveur OPDS (LAN). Kavita écoute en général sur le port 5000.
# Exemple : http://192.168.1.10:5000
base_url = http://192.168.1.10:5000

# Clé API Kavita : dans Kavita -> Paramètres du compte -> "Clé API / OPDS".
api_key = COLLE_TA_CLE_API_KAVITA_ICI

# Gabarit du chemin OPDS. Kavita = /api/opds/{api_key}.
# (calibre-web : /opds  | calibre content server : /opds  | COPS : /opds.php)
opds_path = /api/opds/{api_key}

# Auth HTTP basique optionnelle (calibre-web/COPS). Laisser vide pour Kavita (clé API).
username =
password =

[sync]
# Dossier de destination DANS la mémoire interne visible (Nickel scanne /mnt/onboard).
dest = /mnt/onboard/OPDS

# Formats à récupérer (extensions, séparées par des virgules). Vide = tous.
formats = epub,kepub,pdf,cbz

# Re-télécharger si le fichier existe déjà ? (false recommandé)
overwrite = false

# Organisation : series | author | flat
layout = flat

# Sécurité : nombre max de livres par passe (0 = illimité). Mets 5 pour un 1er test.
max_books = 0

[net]
# Vérifier le certificat TLS. Mets false si ton serveur est en HTTPS auto-signé sur le LAN.
verify_tls = true

# Timeout réseau (secondes).
timeout = 30

# Mode --daemon : intervalle entre deux tentatives de sync (secondes). 900 = 15 min.
interval = 900
