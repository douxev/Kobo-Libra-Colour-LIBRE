# Config pare-feu (couche réseau) — éditable par USB.
# Vit à côté de opds-sync.conf dans /mnt/onboard/.adds/opds-sync/

# Sous-réseau LAN autorisé (tout le reste = bloqué). Adapte à ton réseau.
LAN_SUBNET="192.168.1.0/24"

# (Optionnel) Durcissement : n'autoriser QUE le serveur OPDS au lieu de tout le LAN.
# Renseigne l'IP (et le port) exacts du serveur Kavita ; laisse vide pour autoriser tout le LAN.
OPDS_HOST=""
OPDS_PORT=""

# Activer le pare-feu au boot ? "yes" coupe Internet ; "no" laisse tout passer.
# Défaut "no" pour le 1er test (valide d'abord la sync). Passe à "yes" ensuite
# pour couper Internet, puis reboote.
ENABLE_FIREWALL="no"
