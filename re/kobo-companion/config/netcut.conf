# Firewall (network layer) configuration — editable over USB.
# Lives next to kobo-companion.conf in /mnt/onboard/.adds/kobo-companion/

# Allowed local subnet (everything else is blocked). Adjust to your network.
LAN_SUBNET="192.168.1.0/24"

# (Optional) Hardening: allow ONLY the OPDS server instead of the whole LAN.
# Set the exact IP (and port) of your server; leave empty to allow the whole LAN.
OPDS_HOST=""
OPDS_PORT=""

# Enable the firewall at boot? "yes" cuts the internet; "no" leaves everything open.
# Default "no" for the first run (validate sync first). Switch to "yes" to cut the
# internet, then reboot.
ENABLE_FIREWALL="no"

# Local connectivity-check responder port. When the firewall is on, blocked outbound
# HTTP (:80) is NAT-redirected here, where kobo-syncd answers "Success" so the browser
# still opens (no traffic leaves the device). Must match captive.rs PORT (default 8081).
CAPTIVE_PORT="8081"
