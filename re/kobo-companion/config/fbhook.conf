# Display library (fbhook, Group A) configuration — LD_PRELOAD'd into Nickel.
# Flat key=value INI. Loaded from $KOBO_FBHOOK_CONF
# (default /mnt/onboard/.adds/kobo-companion/fbhook.conf).
#
# WARNING: the EPDC ioctl ABI is kernel-specific. The defaults follow the NXP
# reference and MUST be validated on this device before relying on them.

# Comic colour correction (OKLab LUT, Kaleido-aware) — requires framebuffer mmap.
color = no
saturation = 1.20
gamma = 1.00

# Automatic waveform selection (GC16 for images/comics, DU for text).
waveform = yes

# CFA dithering (via EPDC flags).
dither = yes

# Gamma-corrected night mode.
night = no
night_gamma = 1.00
