# kobo-companion configuration (used by kobo-syncd and kobo-dbtool).
# On the device this lives in /mnt/onboard/.adds/kobo-companion/ — edit it over USB.

# ============ OPDS server (e.g. Kavita) ============
[server]
base_url = http://192.168.1.10:5000
api_key = PASTE_YOUR_KAVITA_API_KEY_HERE
# Path template for the OPDS root. Kavita: /api/opds/{api_key}
# (calibre-web: /opds  ·  calibre content server: /opds  ·  COPS: /opds.php)
opds_path = /api/opds/{api_key}

[sync]
# Destination folder inside the user-visible storage (Nickel scans /mnt/onboard).
dest = /mnt/onboard/OPDS
# File types to fetch (extensions, comma-separated). Empty = all.
formats = epub,kepub,pdf,cbz
overwrite = false
# Per-pass safety cap (0 = unlimited). Set to e.g. 5 for a first test.
max_books = 0

# ============ mTLS (client identity issued by your Caddy CA) ============
# Put cert + key + CA in certs/ (the private key is NEVER committed to git).
# Leave these empty to use plain HTTP/standard TLS.
[mtls]
client_cert = /mnt/onboard/.adds/kobo-companion/certs/client.crt
client_key  = /mnt/onboard/.adds/kobo-companion/certs/client.key
ca_cert     = /mnt/onboard/.adds/kobo-companion/certs/ca.crt

[net]
# Verify the server's TLS certificate.
verify_tls = true
# Accept an invalid certificate (debug only; not recommended).
insecure = false
timeout = 30
# Daemon mode: seconds between sync attempts. 900 = 15 min.
interval = 900

[paths]
kobo_db = /mnt/onboard/.kobo/KoboReader.sqlite

# ============ Web config panel (served by kobo-syncd, localhost ONLY) ============
# Open it on the device's own browser at http://127.0.0.1:<port>/ .
[web]
enabled = true
port = 8080

# ============ Comic panelization (guided-view, panel-per-page) ============
# Runs the bundled comic-panelize on your .cbz comics. Triggered automatically after
# sync when FEAT_panelize=yes, or on demand via the "Panelize now" button in the panel.
[panelize]
# Folder to scan for comics (default = the OPDS dest above).
comics_dir = /mnt/onboard/OPDS
# Reading direction: ltr (comics) or rtl (manga).
direction = ltr
# Target screen size and JPEG quality.
canvas = 1264x1680
quality = 88
# full_page = false       # prepend the whole page before its panels
# no_upscale = false      # don't enlarge small panels
# bin = /usr/local/Kobo/comic-panelize

# ============ Wallabag (read-it-later) ============
[wallabag]
url = https://wallabag.example.lan
client_id =
client_secret =
username =
password =
# Or paste a ready-made token instead of the OAuth2 fields above:
# token =
subdir = Wallabag
archive_after = false

# ============ Annotations / highlights sync ============
[annotations]
endpoint =
pull = false

# ============ Reading positions (KOSync-like) ============
[positions]
endpoint =
device = kobo
pull = true

# ============ Reading stats export (Prometheus text) ============
[stats]
out_file = /mnt/onboard/.adds/kobo-companion/stats.prom

# ============ Conditional Wi-Fi ============
[wifi]
default_airplane = true
# Allowed local-time hour ranges (comma-separated, "start-end").
allowed_hours = 7-9,18-23
# Restrict to these SSIDs (empty = no SSID filter).
allowed_ssids =
tz_offset_hours = 0

# ============ Group B (kobo-dbtool) ============
[collections]
# "folder" = one collection per sub-folder of `root`; "explicit" = use `map`.
mode = folder
root = /mnt/onboard
# map = Novels:/mnt/onboard/Novels;Comics:/mnt/onboard/Comics   (mode=explicit)

[watched]
folder = /mnt/onboard

[sortfilter]
series_from_title = yes
